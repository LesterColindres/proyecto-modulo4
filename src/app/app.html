<div style="padding: 20px;">
  <h1>{{ title }}</h1>
  
  <app-mapa></app-mapa>

  <hr>

  <app-animado></app-animado>

  <hr>

  <div class="panel-tracking">
    <h3>📊 Panel de Tracking (Redux)</h3>
    
    <div *ngIf="contadores$ | async as contadores">
      <ul *ngIf="tieneContadores(contadores)">
        <li *ngFor="let item of contadores | keyvalue">
          <strong>{{ item.key }}</strong>: {{ item.value }} clicks
        </li>
      </ul>
      
      <p *ngIf="!tieneContadores(contadores)">
        No hay actividad registrada aún.
      </p>
    </div>
  </div>
</div>
