<div style="padding: 20px; text-align: center;">
  <h3>Prueba de Animación</h3>
  
  <!-- Caja animada -->
  <div [@cambioEstado]="estado" 
       style="width: 200px; height: 100px; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: white; border-radius: 8px; cursor: pointer;"
       (click)="toggleEstado()"
       appTracking 
       [attr.data-tracking]="'caja-' + estado">
    <p>Estado: {{ estado }}</p>
  </div>

  <!-- Botones -->
  <div>
    <button (click)="toggleEstado()" 
            style="padding: 10px 20px; margin: 5px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;"
            appTracking 
            data-tracking="boton-animacion">
      {{ estado === 'original' ? 'Iniciar' : 'Resetear' }}
    </button>
    
    <button (click)="resetEstado()" 
            style="padding: 10px 20px; margin: 5px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer;"
            appTracking 
            data-tracking="boton-reset">
      Reset
    </button>
  </div>
  
  <p>Estado actual: <strong>{{ estado }}</strong></p>
</div>
