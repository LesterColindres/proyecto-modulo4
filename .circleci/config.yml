version: 2.1
jobs:
  build_and_test:
    docker:
      - image: cimg/node:18.16.0-browsers
    steps:
      - checkout
      - run: npm install
      - run: npm run test -- --watch=false --browsers=ChromeHeadless # Requisito 8
      - run: npx cypress run # Requisito 9
workflows:
  main:
    jobs:
      - build_and_test